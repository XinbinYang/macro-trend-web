name: Daily Strategy NAV Update

on:
  schedule:
    # 北京时间 16:30 (UTC 08:30)
    - cron: '30 8 * * *'
  workflow_dispatch: {}

jobs:
  update-nav:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install supabase pandas numpy

      - name: Run NAV update
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          python scripts/update_strategy_nav.py

      - name: Commit changes (if any)
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add -A
          git diff --quiet && git diff --staged --quiet || git commit -m "Update strategy NAV [$(date +%Y-%m-%d)]"
          git push
