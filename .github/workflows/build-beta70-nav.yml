yml
name: Build Beta70 NAV Artifact

on:
  workflow_dispatch:
  schedule:
    - cron: "30 2 * * *"

permissions:
  contents: write

concurrency:
  group: build-beta70-nav
  cancel-in-progress: true

jobs:
  build-nav:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build monthly NAV
        run: |
          python3 scripts/build_beta70_nav.py --db macro_quant.db --out data/nav/beta70/latest.json --freq monthly
                - name: Commit & push if changed
        run: |
          if git diff --quiet; then exit 0; fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/nav/beta70/latest.json
          git commit -m "chore(nav): rebuild beta70 monthly artifact"
          git push
